<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMSCニュース 配信先管理</title>
  <style>
    :root {
      --primary:   #1a3a5c;
      --accent:    #2e7bcf;
      --accent-lt: #e8f2fc;
      --danger:    #c0392b;
      --danger-lt: #fdecea;
      --success:   #1e7e34;
      --success-lt:#e8f5e9;
      --warn-lt:   #fff8e1;
      --warn:      #f57f17;
      --surface:   #ffffff;
      --bg:        #f0f4f8;
      --border:    #dde4ec;
      --text:      #1a2633;
      --muted:     #6b7a8d;
      --radius:    14px;
      --shadow:    0 4px 20px rgba(26,58,92,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── ヘッダー ── */
    header {
      background: var(--primary); color: #fff;
      padding: 0 20px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; font-size: 1rem;
    }
    .header-title { font-size: 1rem; font-weight: 600; letter-spacing: .03em; }
    .header-sub   { font-size: .72rem; opacity: .7; margin-top: 1px; }
    .logout-btn {
      font-size: .75rem; color: rgba(255,255,255,.65);
      background: none; border: 1px solid rgba(255,255,255,.25);
      border-radius: 6px; padding: 5px 10px; cursor: pointer; transition: all .2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

    /* ── 中央寄せラッパー ── */
    .center-wrap {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px 16px;
    }
    .auth-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 36px 28px;
      width: 100%; max-width: 400px;
    }
    .auth-logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--primary); color: #fff;
      font-size: 1.5rem; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 20px;
    }
    .auth-title {
      text-align: center; font-size: 1.15rem;
      font-weight: 700; color: var(--primary); margin-bottom: 6px;
    }
    .auth-sub {
      text-align: center; font-size: .82rem;
      color: var(--muted); margin-bottom: 28px; line-height: 1.6;
    }

    /* ── PINキーパッド ── */
    .pin-dots {
      display: flex; justify-content: center; gap: 14px; margin-bottom: 28px;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      transition: all .15s;
    }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
    .pin-dot.error  { background: var(--danger); border-color: var(--danger); animation: shake .3s; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)}
    }
    .keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .key {
      height: 64px; border: 1.5px solid var(--border);
      border-radius: 12px; background: var(--surface);
      font-size: 1.3rem; font-weight: 600; color: var(--text);
      cursor: pointer; transition: all .1s; user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    .key:active { background: var(--accent-lt); border-color: var(--accent); transform: scale(.95); }
    .key.del    { font-size: 1.1rem; color: var(--muted); }
    .key.empty  { border: none; background: none; cursor: default; }
    .pin-hint {
      text-align: center; font-size: .78rem;
      color: var(--muted); margin-bottom: 16px;
    }
    .pin-error {
      text-align: center; font-size: .82rem; color: var(--danger);
      background: var(--danger-lt); border-radius: 8px;
      padding: 8px 12px; margin-top: 8px; display: none;
    }

    /* ── セットアップフォーム ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: .78rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .92rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(46,123,207,.12);
    }
    .setup-note {
      font-size: .75rem; color: var(--muted); line-height: 1.6;
      background: var(--warn-lt); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 20px;
    }
    .setup-note strong { color: var(--warn); }
    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .submit-btn:hover  { background: #142d48; }
    .submit-btn:active { transform: scale(.99); }
    .setup-err {
      font-size: .82rem; color: var(--danger);
      background: var(--danger-lt); border-radius: 8px;
      padding: 9px 12px; margin-top: 12px; display: none;
    }

    /* ── メインコンテンツ ── */
    main { max-width: 560px; margin: 0 auto; padding: 24px 16px 40px; }
    .card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden;
    }
    .card-header {
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .card-header .icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--accent-lt); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; flex-shrink: 0;
    }
    .card-title { font-size: .95rem; font-weight: 600; }
    .card-count {
      margin-left: auto; font-size: .75rem;
      background: var(--accent-lt); color: var(--accent);
      padding: 2px 8px; border-radius: 20px; font-weight: 600;
    }
    .card-body { padding: 0 20px; }

    /* ── 配信先リスト ── */
    .recipient-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
      animation: fadeIn .25s ease;
    }
    .recipient-item:last-child { border-bottom: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent-lt); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 700; flex-shrink: 0;
    }
    .email-text {
      flex: 1; font-size: .88rem; word-break: break-all; line-height: 1.4;
    }
    .del-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; flex-shrink: 0; transition: all .15s;
    }
    .del-btn:hover { background: var(--danger-lt); border-color: var(--danger); color: var(--danger); }
    .empty-state {
      padding: 32px 0; text-align: center;
      color: var(--muted); font-size: .85rem;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── 追加フォーム ── */
    .add-form { padding: 16px 20px; }
    .input-row { display: flex; gap: 8px; }
    .email-input {
      flex: 1; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .9rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .email-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(46,123,207,.12);
    }
    .email-input::placeholder { color: #b0bec5; }
    .add-btn {
      padding: 11px 18px; border: none; border-radius: 10px;
      background: var(--accent); color: #fff;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: all .15s;
    }
    .add-btn:hover  { background: #1a6abf; }
    .add-btn:active { transform: scale(.97); }

    /* ── PINリセットリンク ── */
    .reset-link {
      text-align: center; margin-top: 16px;
      font-size: .75rem; color: var(--muted);
    }
    .reset-link a { color: var(--accent); cursor: pointer; text-decoration: underline; }

    /* ── トースト ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 20px; border-radius: 10px;
      font-size: .88rem; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      white-space: nowrap; z-index: 100;
      animation: toastIn .25s ease; pointer-events: none;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    #toast.ok      { background: var(--success); color: #fff; }
    #toast.err     { background: var(--danger);  color: #fff; }
    #toast.loading { background: var(--primary); color: #fff; }

    /* ── スピナー ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ① セットアップ画面（初回のみ） -->
<div id="setup-view" class="hidden">
  <div class="center-wrap">
    <div class="auth-card">
      <div class="auth-logo">🔧</div>
      <p class="auth-title">初期設定</p>
      <p class="auth-sub">初回のみ設定が必要です。<br>次回からはPINコードだけでログインできます。</p>
      <div class="field">
        <label>GitHub Access Token（repo スコープ必須）</label>
        <input type="password" id="setup-pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      </div>
      <div class="field">
        <label>PINコード（4桁の数字）</label>
        <input type="password" id="setup-pin" placeholder="例：1234" maxlength="4"
               inputmode="numeric" pattern="[0-9]*">
      </div>
      <div class="field">
        <label>PINコード（確認）</label>
        <input type="password" id="setup-pin2" placeholder="もう一度入力"  maxlength="4"
               inputmode="numeric" pattern="[0-9]*"
               onkeydown="if(event.key==='Enter')setupSave()">
      </div>
      <div class="setup-note">
        <strong>⚠ このデバイスにのみ保存されます。</strong><br>
        トークンとPINはブラウザーの localStorage に保存されます。共有端末ではご注意ください。
      </div>
      <button class="submit-btn" onclick="setupSave()">設定を保存してログイン</button>
      <div id="setup-err" class="setup-err"></div>
    </div>
  </div>
</div>

<!-- ② PINログイン画面 -->
<div id="pin-view" class="hidden">
  <div class="center-wrap">
    <div class="auth-card">
      <div class="auth-logo">🔐</div>
      <p class="auth-title">MMSCニュース</p>
      <p class="auth-sub">PINコードを入力してください</p>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="keypad">
        <button class="key" onclick="pinKey('1')">1</button>
        <button class="key" onclick="pinKey('2')">2</button>
        <button class="key" onclick="pinKey('3')">3</button>
        <button class="key" onclick="pinKey('4')">4</button>
        <button class="key" onclick="pinKey('5')">5</button>
        <button class="key" onclick="pinKey('6')">6</button>
        <button class="key" onclick="pinKey('7')">7</button>
        <button class="key" onclick="pinKey('8')">8</button>
        <button class="key" onclick="pinKey('9')">9</button>
        <button class="key empty"></button>
        <button class="key" onclick="pinKey('0')">0</button>
        <button class="key del" onclick="pinDel()">⌫</button>
      </div>
      <div id="pin-error" class="pin-error">PINコードが違います</div>
      <div class="reset-link">
        <a onclick="resetSetup()">PINを忘れた場合はこちら</a>
      </div>
    </div>
  </div>
</div>

<!-- ③ 管理画面 -->
<div id="main-view" class="hidden">
  <header>
    <div class="header-left">
      <div class="logo-icon">📧</div>
      <div>
        <div class="header-title">MMSCニュース</div>
        <div class="header-sub">配信先管理</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </header>
  <main>
    <div class="card">
      <div class="card-header">
        <div class="icon">📋</div>
        <span class="card-title">配信先一覧</span>
        <span class="card-count" id="count">0 件</span>
      </div>
      <div class="card-body">
        <div id="recipient-list">
          <div class="empty-state">
            <div class="spinner" style="border-color:rgba(0,0,0,.1);border-top-color:var(--accent);margin:0 auto 8px;"></div>
            読み込み中...
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="icon">➕</div>
        <span class="card-title">配信先を追加</span>
      </div>
      <div class="add-form">
        <div class="input-row">
          <input type="email" id="new-email" class="email-input"
                 placeholder="example@gmail.com"
                 onkeydown="if(event.key==='Enter')addRecipient()">
          <button class="add-btn" onclick="addRecipient()">
            <span id="add-label">追加</span>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="hidden"></div>

<script>
/* ──────────────────────────────
   設定・定数
────────────────────────────── */
const REPO = "makotonozawa1-bit/mmsc-news";
const FILE = "recipients.json";
const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

/* ──────────────────────────────
   ストレージ
────────────────────────────── */
const store = {
  get pat()  { return localStorage.getItem("mmsc_pat") || ""; },
  get pin()  { return localStorage.getItem("mmsc_pin") || ""; },
  set pat(v) { localStorage.setItem("mmsc_pat", v); },
  set pin(v) { localStorage.setItem("mmsc_pin", v); },
  clear()    { localStorage.removeItem("mmsc_pat"); localStorage.removeItem("mmsc_pin"); },
  hasSetup() { return !!this.pat && !!this.pin; },
};

/* ──────────────────────────────
   PINハッシュ（簡易）
────────────────────────────── */
async function hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode("mmsc:" + pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

/* ──────────────────────────────
   セットアップ
────────────────────────────── */
async function setupSave() {
  const pat  = document.getElementById("setup-pat").value.trim();
  const pin  = document.getElementById("setup-pin").value.trim();
  const pin2 = document.getElementById("setup-pin2").value.trim();
  const err  = document.getElementById("setup-err");

  if (!pat.startsWith("ghp_") && !pat.startsWith("github_pat_")) {
    err.textContent = "正しいトークンを入力してください"; err.style.display = "block"; return;
  }
  if (!/^\d{4}$/.test(pin)) {
    err.textContent = "PINコードは4桁の数字で入力してください"; err.style.display = "block"; return;
  }
  if (pin !== pin2) {
    err.textContent = "PINコードが一致しません"; err.style.display = "block"; return;
  }
  err.style.display = "none";
  store.pat = pat;
  store.pin = await hashPin(pin);
  sessionStorage.setItem("mmsc_auth", "1");
  showMain();
}

/* ──────────────────────────────
   PINログイン
────────────────────────────── */
let _pinBuf = "";

function pinKey(k) {
  if (_pinBuf.length >= 4) return;
  _pinBuf += k;
  updateDots();
  if (_pinBuf.length === 4) setTimeout(checkPin, 120);
}
function pinDel() {
  _pinBuf = _pinBuf.slice(0, -1);
  updateDots();
}
function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`d${i}`).className = "pin-dot" + (_pinBuf.length > i ? " filled" : "");
  }
}
async function checkPin() {
  const h = await hashPin(_pinBuf);
  if (h === store.pin) {
    sessionStorage.setItem("mmsc_auth", "1");
    showMain();
  } else {
    document.querySelectorAll(".pin-dot").forEach(d => d.className = "pin-dot error");
    document.getElementById("pin-error").style.display = "block";
    setTimeout(() => {
      _pinBuf = "";
      updateDots();
      document.getElementById("pin-error").style.display = "none";
    }, 900);
  }
}
function resetSetup() {
  if (!confirm("PINとトークンの設定をリセットします。\n初期設定画面に戻りますか？")) return;
  store.clear();
  sessionStorage.removeItem("mmsc_auth");
  location.reload();
}

/* ──────────────────────────────
   ログアウト
────────────────────────────── */
function logout() {
  if (!confirm("ログアウトしますか？\n（次回はPINコードの入力が必要になります）")) return;
  sessionStorage.removeItem("mmsc_auth");
  _pinBuf = "";
  hide("main-view");
  updateDots();
  document.getElementById("pin-error").style.display = "none";
  show("pin-view");
}

/* ──────────────────────────────
   画面切り替え
────────────────────────────── */
function show(id) { document.getElementById(id).classList.remove("hidden"); }
function hide(id) { document.getElementById(id).classList.add("hidden"); }
function showMain() {
  ["setup-view","pin-view"].forEach(hide);
  show("main-view"); render();
}

/* ──────────────────────────────
   トースト
────────────────────────────── */
let _toastTimer;
function toast(msg, type = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = `toast ${type}`;
  el.classList.remove("hidden");
  clearTimeout(_toastTimer);
  if (type !== "loading") _toastTimer = setTimeout(() => el.classList.add("hidden"), 3000);
}

/* ──────────────────────────────
   GitHub API
────────────────────────────── */
async function ghApi(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: { Authorization: `Bearer ${store.pat}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || `API エラー (${res.status})`); }
  const t = await res.text(); return t ? JSON.parse(t) : {};
}
async function load() {
  const d = await ghApi("GET", API);
  const j = JSON.parse(atob(d.content.replace(/\n/g,"")));
  return { recipients: j.recipients || [], sha: d.sha };
}
async function save(recipients, sha) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify({ recipients }, null, 2) + "\n")));
  return ghApi("PUT", API, { message: "配信先を更新", content, sha });
}

/* ──────────────────────────────
   配信先管理
────────────────────────────── */
async function render() {
  toast("読み込み中...", "loading");
  try {
    const { recipients } = await load();
    document.getElementById("count").textContent = `${recipients.length} 件`;
    const list = document.getElementById("recipient-list");
    if (!recipients.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>配信先が登録されていません</div>`;
    } else {
      list.innerHTML = recipients.map((r,i) => `
        <div class="recipient-item" id="item-${i}">
          <div class="avatar">${r[0].toUpperCase()}</div>
          <span class="email-text">${r}</span>
          <button class="del-btn" onclick="remove(${i})" title="削除">✕</button>
        </div>`).join("");
    }
    document.getElementById("toast").classList.add("hidden");
  } catch(e) { toast("読み込み失敗: " + e.message, "err"); }
}
async function addRecipient() {
  const input = document.getElementById("new-email");
  const email = input.value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    toast("正しいメールアドレスを入力してください", "err"); return;
  }
  document.getElementById("add-label").innerHTML = '<span class="spinner"></span>';
  try {
    const { recipients, sha } = await load();
    if (recipients.includes(email)) { toast("すでに登録されています", "err"); return; }
    await save([...recipients, email], sha);
    input.value = "";
    toast(`${email} を追加しました`, "ok");
    await render();
  } catch(e) { toast("追加失敗: " + e.message, "err"); }
  finally { document.getElementById("add-label").textContent = "追加"; }
}
async function remove(index) {
  const email = document.getElementById(`item-${index}`).querySelector(".email-text").textContent;
  if (!confirm(`${email} を削除しますか？`)) return;
  toast("削除中...", "loading");
  try {
    const { recipients, sha } = await load();
    await save(recipients.filter((_,i) => i !== index), sha);
    toast(`${email} を削除しました`, "ok");
    await render();
  } catch(e) { toast("削除失敗: " + e.message, "err"); }
}

/* ──────────────────────────────
   初期表示
────────────────────────────── */
window.onload = () => {
  if (!store.hasSetup())            { show("setup-view"); return; }
  if (sessionStorage.getItem("mmsc_auth") === "1") { showMain(); return; }
  show("pin-view");
};
</script>
</body>
